# Sprint 38 — Brecha C (photogrammetry pipeline auto).
#
# Cloud Build config for the COLMAP photogrammetry worker. Triggered manually
# (the user explicitly opted out of an automated CI deploy in this sprint).
#
# Manual invocation:
#   gcloud builds submit --config cloud-run/photogrammetry-worker/cloudbuild.yaml \
#     cloud-run/photogrammetry-worker/
#
# After build, Cloud Run gets a new revision with --cpu=4 --memory=8Gi
# --timeout=1800 (30 min). The image is large (~3 GB because of COLMAP +
# ffmpeg), expect ~5-10 min build time.

substitutions:
  _REGION: southamerica-west1
  _SERVICE: photogrammetry-worker
  _REPO: praeventio
  _OUTPUT_BUCKET: praeventio-photogrammetry

steps:
  # 1. Build the multi-stage image.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # 3. Deploy to Cloud Run.
  #    --no-allow-unauthenticated keeps the worker private — invoke via Cloud
  #    Tasks with an OIDC token minted from the API service account.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --cpu
      - "4"
      - --memory
      - 8Gi
      - --timeout
      - "1800"
      - --concurrency
      - "1"
      - --max-instances
      - "5"
      - --set-env-vars
      - PHOTOGRAMMETRY_OUTPUT_BUCKET=${_OUTPUT_BUCKET}
      - --set-secrets
      - PHOTOGRAMMETRY_WORKER_TOKEN=photogrammetry-worker-token:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
