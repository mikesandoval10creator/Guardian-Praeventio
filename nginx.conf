# Guardian Praeventio — minimal nginx site config for the static SPA image.
#
# Conservative security headers: we DO NOT set a strict script-src CSP because
# the SPA bootstraps Sentry and Firebase from third-party domains and we are
# not yet emitting CSP nonces. Frame-ancestors covers clickjacking; the rest
# is informational/best-practice.
#
# Cache strategy:
# - /assets/*  → 1y immutable (vite emits content-hashed filenames)
# - *.html     → no-cache (so the SPA shell can pick up new asset hashes)
#
# The base nginx:alpine image already declares `user nginx;` at the main
# scope, so we only ship the server{} block (this file is included into
# /etc/nginx/conf.d/).

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/manifest+json
        image/svg+xml;

    # ── security headers (conservative — no script-src CSP) ───────────────
    add_header X-Content-Type-Options       "nosniff"                       always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy      "frame-ancestors 'none'"        always;
    add_header X-Frame-Options              "DENY"                          always;
    add_header Permissions-Policy           "geolocation=(self), camera=(self), microphone=(self), payment=()" always;

    # ── caching ───────────────────────────────────────────────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|png|jpg|jpeg|gif|svg|webp|ico|wasm)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Liveness probe (cheap, no logs) ───────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Hide nginx version in error pages and Server header.
    server_tokens off;
}
