# M14: Dependabot configuration
# Note: this repo uses legacy-peer-deps=true (.npmrc) — Dependabot PRs may
# need `npm install --legacy-peer-deps` if peer conflicts arise.
version: 2

updates:
  # npm — group minor + patch updates to reduce PR noise
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'America/Santiago'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'

  # GitHub Actions — keep workflow actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'America/Santiago'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
