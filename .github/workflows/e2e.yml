name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual run

jobs:
  e2e:
    name: Playwright (chromium + mobile-android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        # --with-deps installs system libs needed on Ubuntu runner
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --project=mobile-android
        env:
          CI: 'true'

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace files on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  e2e-full-stack:
    # Sprint 22 Bucket Z — un-skip the 4 specs gated by E2E_FULL_STACK.
    # Boots Express (E2E_MODE=1) + Firestore emulator + preview bundle so the
    # process-lifecycle / sos-button / fall-detection-toggle / offline-resilience
    # specs can run end-to-end. Kept as a separate job so a flaky emulator does
    # not block the basic chromium smoke suite above.
    name: Playwright full-stack (Express + Firestore emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    # Sprint 34 — gating real per audit P0 §1.4.
    # `continue-on-error` se flipeó a false una vez que los 4 specs
    # full-stack quedaron robustos (sos-button: expect.poll buffer 3500ms;
    # process-lifecycle: expect timeouts explícitos; fall-detection-toggle:
    # waitFor por role/state; offline-resilience: expect.poll de Firestore
    # sync en lugar de waitForTimeout(2_000)). Si alguno vuelve a fallar
    # cosméticamente, se prefiere `test.fixme(...)` en el spec antes que
    # neutralizar el job entero — un fail explícito > cobertura ficticia.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase tools (emulator)
        run: npm install -g firebase-tools@13

      - name: Install Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build production bundle
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run Playwright full-stack tests
        # E2E_FULL_STACK=1 wires playwright.config.ts to spawn preview +
        # Express (E2E_MODE=1) + firestore emulator simultaneously, and
        # un-skips the 4 lifecycle/SOS/fall-detection/offline specs.
        run: npx cross-env E2E_FULL_STACK=1 FIRESTORE_EMULATOR_HOST=127.0.0.1:8080 GOOGLE_CLOUD_PROJECT=demo-test E2E_TEST_SECRET=e2e-test-secret-do-not-use-in-prod playwright test --project=chromium
        env:
          CI: 'true'

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fullstack
          path: playwright-report/
          retention-days: 14

      - name: Upload trace files on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-fullstack
          path: test-results/
          retention-days: 14
