name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual run

# Cancel in-progress E2E runs when a new commit is pushed to the same PR.
concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium + mobile-android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        # --with-deps installs system libs needed on Ubuntu runner
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # B14: CI validation lanes don't ship the bundle — skip the
          # 483 MB SLM prepackage download. Release/deploy lanes MUST
          # run the real prepackage (they don't set this).
          SLM_PREPACKAGE_SKIP: '1'

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --project=mobile-android
        env:
          CI: 'true'

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace files on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  e2e-full-stack:
    # Sprint 22 Bucket Z — un-skip the 4 specs gated by E2E_FULL_STACK.
    # Boots Express (E2E_MODE=1) + Firestore emulator + preview bundle so the
    # process-lifecycle / sos-button / fall-detection-toggle / offline-resilience
    # specs can run end-to-end. Kept as a separate job so a flaky emulator does
    # not block the basic chromium smoke suite above.
    name: Playwright full-stack (Express + Firestore emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    # Sprint 34 — gating real per audit P0 §1.4.
    # `continue-on-error` se flipeó a false una vez que los 4 specs
    # full-stack quedaron robustos (sos-button: expect.poll buffer 3500ms;
    # process-lifecycle: expect timeouts explícitos; fall-detection-toggle:
    # waitFor por role/state; offline-resilience: expect.poll de Firestore
    # sync en lugar de waitForTimeout(2_000)). Si alguno vuelve a fallar
    # cosméticamente, se prefiere `test.fixme(...)` en el spec antes que
    # neutralizar el job entero — un fail explícito > cobertura ficticia.
    # Sprint 34 E7 flipeó esto a `false`. Sprint 34 CI reveló que 2 specs
    # adicionales fallan post-i18n sweep (accessibility heading text changed,
    # fall-detection-toggle reload locator timeout). Restaurado a `true` para
    # destrabar el merge de #70; Sprint 35+ reabordará la robustez de esos
    # specs específicos antes de re-flipear.
    # Sprint 36 — re-flipeado a `false`. Las 2 specs fueron robustecidas:
    #   • accessibility.spec.ts:144 → expect tolerante a hidratación lazy
    #     del LocaleProvider (toHaveText(/\S+/) en lugar de !== '').
    #   • fall-detection-toggle → locator pasa a `getByRole('switch')` y
    #     aserción contra `aria-checked` en lugar del aria-label literal,
    #     sobreviviendo cualquier rewording i18n.
    # Los aria-labels hardcoded en Settings.tsx también fueron extraídos
    # a `settings.aria.*` keys (10 toggles), eliminando la última fuente
    # de fragilidad contra rewording español. Si vuelve a fallar es una
    # regresión real y debe gatear el merge.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase tools (emulator)
        run: npm install -g firebase-tools@13

      - name: Install Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build bundle (mode=test) for E2E full-stack
        # §2.23 fix (2026-05-21) — Build con `--mode test` para que el
        # bundle servido por `vite preview` tenga `import.meta.env.MODE
        # === 'test'`. Sin esto los gates de E2E shim
        # (`isE2EMode()` en src/lib/e2eAuth.ts + connectFirestoreEmulator
        # en src/services/firebase.ts) nunca activaban, dejando los specs
        # E2E full-stack (sos-button, fall-detection, offline-resilience,
        # process-lifecycle) sin frontend conectado al emulator ni shim
        # de user state. Esta job es exclusiva del E2E full-stack;
        # los builds productivos siguen siendo `npm run build` default.
        run: npm run build -- --mode test
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # B14: CI validation lanes don't ship the bundle — skip the
          # 483 MB SLM prepackage download. Release/deploy lanes MUST
          # run the real prepackage (they don't set this).
          SLM_PREPACKAGE_SKIP: '1'

      - name: Run Playwright full-stack tests
        # E2E_FULL_STACK=1 wires playwright.config.ts to spawn preview +
        # Express (E2E_MODE=1) + firestore+auth emulators simultaneously,
        # and un-skips the 4 lifecycle/SOS/fall-detection/offline specs.
        # §2.24 fix (2026-05-21) — agregado FIREBASE_AUTH_EMULATOR_HOST
        # para que firebase-admin (en seed.ts) + fixture loginAsTestUser
        # detecten el Auth Emulator y firmen un custom token real. Sin
        # este env var, firebase-admin defaultea a production y signInWith
        # CustomToken intenta verificar contra prod (no es el caso E2E).
        run: npx cross-env E2E_FULL_STACK=1 FIRESTORE_EMULATOR_HOST=127.0.0.1:8080 FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099 GOOGLE_CLOUD_PROJECT=demo-test E2E_TEST_SECRET=e2e-test-secret-do-not-use-in-prod playwright test --project=chromium
        env:
          CI: 'true'

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-fullstack
          path: playwright-report/
          retention-days: 14

      - name: Upload trace files on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-fullstack
          path: test-results/
          retention-days: 14
