# M28: Infrastructure lint — hadolint (Docker), tflint + tfsec (Terraform), markdownlint
# All jobs are continue-on-error: true — pre-existing issues must not turn CI red.
name: Lint Infrastructure

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint Dockerfile.api
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.api

      - name: Lint Dockerfile.frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.frontend

  tflint:
    name: tflint (Terraform)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        name: Cache tflint plugins
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('infrastructure/terraform/.tflint.hcl') }}-v1

      - uses: terraform-linters/setup-tflint@v4
        name: Setup tflint
        with:
          tflint_version: v0.52.0

      - name: Init tflint
        run: tflint --init
        working-directory: infrastructure/terraform

      - name: Run tflint
        run: tflint -f compact
        working-directory: infrastructure/terraform

  tfsec:
    name: tfsec (Terraform security)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          soft_fail: true

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'
          config: '{"default": true, "MD013": false, "MD033": false, "MD041": false}'
