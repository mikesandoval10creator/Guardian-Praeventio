name: Mutation Testing (Stryker)

# Sprint 39 (Fase B.1) — promoted to **required check** by removing
# `continue-on-error: true` and the `|| true` suffix on the threshold
# script. Honest gating: if mutation coverage falls below thresholds,
# the PR is red. Mantiene CODEX P1-6 "CI warning-only" cerrado.
#
# Runner: ubuntu-latest. Windows local sigue con
# STATUS_STACK_BUFFER_OVERRUN en `limiters.ts` (deuda separada).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly run at 03:17 UTC (~22:17 America/Santiago) so a green/red
    # signal is ready before the morning standup, without contesting CI
    # capacity during work hours.
    - cron: '17 3 * * *'

jobs:
  mutation:
    name: Stryker mutation testing (Linux)
    runs-on: ubuntu-latest
    # Sprint 34 baseline: ~3-5 min historically on Windows local; CI cold
    # cache + ubuntu-latest single-host adds margin. 60 min is the hard
    # ceiling — anything slower indicates pathological mutant set or
    # regression in test runtime.
    timeout-minutes: 60
    # Sprint 39 Fase B.1: continue-on-error removido — el job ahora
    # bloquea merge si la mutación cae bajo thresholds. Esto cierra
    # CODEX P1-6 (CI warning-only). Si el threshold se vuelve flaky
    # por una razón legítima (mutant equivalente, oracle drift), ajustar
    # el script en scripts/check-mutation-thresholds.cjs, no re-activar
    # continue-on-error.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run Stryker mutation testing
        run: npm run mutation
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Apply per-file mutation thresholds (post-hoc)
        # Stryker 9.6.1 schema does not support per-file thresholds. This
        # script parses reports/mutation/report.json and enforces per-file
        # ratchets (high-coverage files cannot regress, critical files
        # target 75%+). Sprint 39 Fase B.1: `|| true` removido — el script
        # ahora falla el job si los thresholds no se cumplen.
        run: node scripts/check-mutation-thresholds.cjs

      - name: Upload Stryker HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: |
            reports/mutation/
          retention-days: 14

      - name: Upload Stryker JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-json
          path: reports/mutation/report.json
          retention-days: 30
          if-no-files-found: warn
