name: Mutation Testing (Stryker)

# Sprint 34 — Linux runner enabled to fix the Windows-only
# STATUS_STACK_BUFFER_OVERRUN crash on `limiters.ts` that left it at 3% mutation
# coverage despite 72% global. The runner is informational for 1-2 runs
# (continue-on-error: true), then promoted to a required check in Sprint 35
# once we have 2 green runs.
#
# Audit P1 / user gap: Stryker on Windows local crashes with
# STATUS_STACK_BUFFER_OVERRUN inside vitest worker forks for `limiters.ts`.
# The Linux runner does not exhibit the crash. This workflow is the source
# of truth until Windows local is fixed (deferred).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly run at 03:17 UTC (~22:17 America/Santiago) so a green/red
    # signal is ready before the morning standup, without contesting CI
    # capacity during work hours.
    - cron: '17 3 * * *'

jobs:
  mutation:
    name: Stryker mutation testing (Linux)
    runs-on: ubuntu-latest
    # Sprint 34 baseline: ~3-5 min historically on Windows local; CI cold
    # cache + ubuntu-latest single-host adds margin. 60 min is the hard
    # ceiling — anything slower indicates pathological mutant set or
    # regression in test runtime.
    timeout-minutes: 60
    # Sprint 34: do NOT block merges yet. Promote to required in Sprint 35
    # once we observe 2 successful runs with stable thresholds.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run Stryker mutation testing
        run: npm run mutation
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Apply per-file mutation thresholds (post-hoc)
        # Stryker 9.6.1 schema does not support per-file thresholds. This
        # script parses reports/mutation/report.json and enforces per-file
        # ratchets (high-coverage files cannot regress, critical files
        # target 75%+). Sprint 34: warning-only via `|| true` so the job
        # surface signal without blocking. Sprint 35: drop the `|| true`.
        run: node scripts/check-mutation-thresholds.cjs || true

      - name: Upload Stryker HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: |
            reports/mutation/
          retention-days: 14

      - name: Upload Stryker JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-json
          path: reports/mutation/report.json
          retention-days: 30
          if-no-files-found: warn
