name: Performance Budgets

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress perf runs when a new commit is pushed to the same PR.
concurrency:
  group: perf-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # JOB-level env so EVERY build in this job inherits it — including the
    # build that `andresz1/size-limit-action` runs internally (it executes its
    # own `npm run build`, separate from the "Build" step below). Setting the
    # SLM skip only at step level let the action's build run the real prebuild
    # → SLM prepackage → HuggingFace fetch, and a transient HF 429 flaked the
    # gate (blocked #878 and #902). The size budget measures the JS bundle
    # only, never the SLM model. Release/deploy lanes never set this skip.
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      SLM_PREPACKAGE_SKIP: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Generate size report
        run: npx size-limit --json > size-report.json
      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report.json
      - name: Comment size budget on PR
        # 2026-05-15 estabilización CI: `andresz1/size-limit-action@v1`
        # solo soporta eventos `pull_request` — en `push` a main no hay PR
        # context y el action falla con "No PR found". Skipeamos en push
        # (el report YA quedó subido como artifact en el step anterior).
        if: github.event_name == 'pull_request'
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          script: 'size'
          skip_step: install

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # B14: CI validation lanes don't ship the bundle — skip the
          # 483 MB SLM prepackage download. Release/deploy lanes MUST
          # run the real prepackage (they don't set this).
          SLM_PREPACKAGE_SKIP: '1'
      - name: Install Chromium system deps
        run: npx playwright install-deps chromium || sudo apt-get install -y libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64 libgbm1
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
