# M13: CodeQL static analysis — JavaScript/TypeScript
# Mirrors ossar.yml trigger shape (push main + PR main + weekly schedule)
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Saturdays at 03:00 UTC
    - cron: '0 3 * * 6'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # No build step needed — CodeQL handles JS/TS via autobuild

      # Autobuild not required for JavaScript/TypeScript interpreted languages.
      # CodeQL will scan the source directly without building.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
