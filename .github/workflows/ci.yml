name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR.
# This prevents stale CI runs from hogging runner capacity.
concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify-roles:
    name: RBAC roles sync
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Verify src/types/roles.ts and firestore.rules agree
        run: node scripts/verify-roles-sync.cjs

  lint:
    # AUDIT-2026-06 B19 — CLAUDE.md afirmaba que CI corre lint, pero no
    # existía job (y `npm run lint` llevaba tiempo roto: el parser del
    # plugin firestore no es serializable con --cache). Gate de ERRORES
    # solamente — las ~2.4k warnings son deuda conocida con política de
    # promoción a strict gate en Fase F (ver eslint.config.js header).
    name: ESLint (errors gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint src + server + firestore.rules
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck:ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: Tests (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    # fix/ci-tests-unblock-deploy-2026-06-22 — the full suite grew to ~14 min
    # total (>1 500 test files), which caused the previous single-job 14-min
    # watchdog to fire on EVERY run (both attempts). Root cause: SLOW, not a
    # true hang. Fix: 4-way matrix shard; each shard runs ~3-4 min, well inside
    # the 10-min watchdog below. The `test-pass` aggregator job (below) is
    # `needs`-ed by downstream jobs so the gate still holds.
    timeout-minutes: 30
    strategy:
      fail-fast: true   # fail all shards if one shard has test failures
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Each shard runs 1/4 of the test files. vitest's --shard flag splits
      # the file list deterministically by index, so coverage is complete
      # across the 4 shards. The 10-min watchdog is generous for a ~3-4 min
      # shard; a real freeze (not slow runtime) still fails fast.
      - name: Run vitest shard ${{ matrix.shard }}/4
        run: |
          set +e
          timeout 10m node --max-old-space-size=4096 ./node_modules/vitest/vitest.mjs run \
            --test-timeout=30000 \
            --shard=${{ matrix.shard }}/4
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::warning::vitest shard ${{ matrix.shard }}/4 pool hang detected (>10m) — retrying once"
            timeout 10m node --max-old-space-size=4096 ./node_modules/vitest/vitest.mjs run \
              --test-timeout=30000 \
              --shard=${{ matrix.shard }}/4
            rc=$?
          fi
          exit $rc
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # Aggregator: downstream jobs (build, deploy) need a single gate.
  # All 4 shards must pass before this job turns green.
  test-pass:
    name: Tests (all shards passed)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    steps:
      - run: echo "All test shards passed"

  validate-env:
    # Bucket U.5 — env-var shape check. We use --mode test so this job
    # passes against the .env.example template (placeholders allowed,
    # optional vars skipped). Real prod secrets live in deploy-only
    # GitHub secrets and are validated at boot via the package.json
    # "start" path consuming "validate:env" without --mode test.
    name: Validate env
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Validate env shape (test mode tolerates placeholders)
        run: node scripts/validate-env.cjs --mode test

  rules-tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-tools (provides Firestore emulator)
        run: npm install -g firebase-tools

      - name: Run rules tests against emulator
        # `firebase emulators:exec` boots the Firestore emulator, runs the
        # provided command, then tears it down. The project ID must match the
        # PROJECT_ID constant in src/rules-tests/firestore.rules.test.ts.
        #
        # 2026-05-15: usa la config dedicada `vitest.rules.config.ts` porque
        # la config default excluye `src/rules-tests/**` (esos tests
        # requieren emulator). Sin --config el workflow falla con "No test
        # files found" porque vitest aplica el exclude antes que el filter.
        # 2026-06-09: añadido `storage` al boot — `storageRules.rules.test.ts`
        # corre contra el Storage emulator (firebase.json :9199). Sin esto el
        # test falla con "storage emulator is not running". Mirror de
        # `npm run test:rules` (package.json).
        run: firebase emulators:exec --only firestore,storage --project praeventio-rules-test "npx vitest run --config vitest.rules.config.ts"

  firestore-stores:
    # Plan 2026-05-23 §Fase C — tests de stores client-side (factory
    # `createProjectScopedStore<T>` + 14 stores Sprint K migrados en B.4)
    # contra el Firestore Emulator real. Decisión usuario 2026-05-23:
    # emulator real (lento, fiel) en vez de mocks.
    #
    # Distinto del `rules-tests` job: usa `firebase-admin` (bypass de
    # rules) porque testea LÓGICA de stores, no las security rules.
    name: Firestore stores tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-tools (provides Firestore emulator)
        run: npm install -g firebase-tools

      - name: Run firestore-stores tests against emulator
        # PROJECT_ID = 'praeventio-test' coincide con el default de
        # `src/test/firestore-emulator-setup.ts`. La config dedicada
        # `vitest.firestore.config.ts` incluye SOLO `*.firestore.test.ts`
        # (la default los excluye porque requieren emulator).
        #
        # `--config firebase.emulator-tests.json` arranca el emulador con
        # reglas ABIERTAS (firestore.test.rules) porque estos stores usan el
        # CLIENT SDK (sujeto a reglas) y el cliente de test NO está autenticado
        # → con las reglas de prod (default-deny) toda op daba 7 PERMISSION_
        # DENIED. Acá testeamos la LÓGICA del store, no las reglas (esas tienen
        # su propio job `Firestore rules tests` contra firestore.rules real).
        run: firebase emulators:exec --config firebase.emulator-tests.json --only firestore --project praeventio-test "npx vitest run --config vitest.firestore.config.ts"

  adr-0012-enforcement:
    # Sprint 26 Bucket XX — ADR 0012 (no diagnosis) automated enforcement.
    # Replays the pre-commit hook against changed files in the PR so a contributor
    # who used --no-verify can't sneak diagnostic code past review.
    name: "ADR 0012 — no diagnosis enforcement"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Stage diff and run medical guard
        env:
          # PR checkout points at a synthetic merge commit; its first parent is
          # the base. Pushes to main compare the new commit with its parent.
          MEDICAL_GUARD_DIFF_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: |
          # CI inspects the committed base...HEAD range directly. It must not
          # mutate the index: ignored-but-tracked design docs and whitespace in
          # paths made the old `xargs git add` bootstrap fail before the guard.
          node scripts/precommit-medical-guard.cjs

      - name: Run medical guard unit tests
        run: node --test src/__tests__/scripts/medicalGuard.test.cjs

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # B14: CI validation lanes don't ship the bundle — skip the
          # 483 MB SLM prepackage download. Release/deploy lanes MUST
          # run the real prepackage (they don't set this).
          SLM_PREPACKAGE_SKIP: '1'
