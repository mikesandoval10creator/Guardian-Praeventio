name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-roles:
    name: RBAC roles sync
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify src/types/roles.ts and firestore.rules agree
        run: node scripts/verify-roles-sync.cjs

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck:ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: Tests
    runs-on: ubuntu-latest
    # Global safety cap (2026-05-29): a flaky vitest hang previously ran to
    # GitHub's 6h default, hogging a runner and saturating the queue so that
    # green-but-for-Tests PRs could not merge. 30 min is well above the
    # healthy runtime (~12-15 min) so it only fires on a genuine hang.
    # Applied to every job below as defensive hygiene.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test:ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  validate-env:
    # Bucket U.5 — env-var shape check. We use --mode test so this job
    # passes against the .env.example template (placeholders allowed,
    # optional vars skipped). Real prod secrets live in deploy-only
    # GitHub secrets and are validated at boot via the package.json
    # "start" path consuming "validate:env" without --mode test.
    name: Validate env
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate env shape (test mode tolerates placeholders)
        run: node scripts/validate-env.cjs --mode test

  rules-tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-tools (provides Firestore emulator)
        run: npm install -g firebase-tools

      - name: Run rules tests against emulator
        # `firebase emulators:exec` boots the Firestore emulator, runs the
        # provided command, then tears it down. The project ID must match the
        # PROJECT_ID constant in src/rules-tests/firestore.rules.test.ts.
        #
        # 2026-05-15: usa la config dedicada `vitest.rules.config.ts` porque
        # la config default excluye `src/rules-tests/**` (esos tests
        # requieren emulator). Sin --config el workflow falla con "No test
        # files found" porque vitest aplica el exclude antes que el filter.
        run: firebase emulators:exec --only firestore --project praeventio-rules-test "npx vitest run --config vitest.rules.config.ts"

  firestore-stores:
    # Plan 2026-05-23 §Fase C — tests de stores client-side (factory
    # `createProjectScopedStore<T>` + 14 stores Sprint K migrados en B.4)
    # contra el Firestore Emulator real. Decisión usuario 2026-05-23:
    # emulator real (lento, fiel) en vez de mocks.
    #
    # Distinto del `rules-tests` job: usa `firebase-admin` (bypass de
    # rules) porque testea LÓGICA de stores, no las security rules.
    name: Firestore stores tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-tools (provides Firestore emulator)
        run: npm install -g firebase-tools

      - name: Run firestore-stores tests against emulator
        # PROJECT_ID = 'praeventio-test' coincide con el default de
        # `src/test/firestore-emulator-setup.ts`. La config dedicada
        # `vitest.firestore.config.ts` incluye SOLO `*.firestore.test.ts`
        # (la default los excluye porque requieren emulator).
        #
        # `--config firebase.emulator-tests.json` arranca el emulador con
        # reglas ABIERTAS (firestore.test.rules) porque estos stores usan el
        # CLIENT SDK (sujeto a reglas) y el cliente de test NO está autenticado
        # → con las reglas de prod (default-deny) toda op daba 7 PERMISSION_
        # DENIED. Acá testeamos la LÓGICA del store, no las reglas (esas tienen
        # su propio job `Firestore rules tests` contra firestore.rules real).
        run: firebase emulators:exec --config firebase.emulator-tests.json --only firestore --project praeventio-test "npx vitest run --config vitest.firestore.config.ts"

  adr-0012-enforcement:
    # Sprint 26 Bucket XX — ADR 0012 (no diagnosis) automated enforcement.
    # Replays the pre-commit hook against changed files in the PR so a contributor
    # who used --no-verify can't sneak diagnostic code past review.
    name: "ADR 0012 — no diagnosis enforcement"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stage diff and run medical guard
        run: |
          # Stage all changed files vs base so the hook's `git diff --cached`
          # query sees the PR's contents. Falls back to staging the whole tree
          # on the first commit (no HEAD~1).
          #
          # `--diff-filter=ACMR` excludes Deletions — `git add <deleted-file>`
          # fails with "pathspec did not match any files" and would abort the
          # job. Deletes need no staging anyway (the precommit hook scans
          # diffs in surviving content).
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only --diff-filter=ACMR HEAD~1 HEAD | xargs -r git add
          else
            git add -A
          fi
          node scripts/precommit-medical-guard.cjs

      - name: Run medical guard unit tests
        run: node --test src/__tests__/scripts/medicalGuard.test.cjs

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
