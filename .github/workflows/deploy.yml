name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: praeventio-541ad
  REGION: us-central1
  SERVICE: guardian-praeventio
  IMAGE: us-central1-docker.pkg.dev/praeventio-541ad/guardian-praeventio/guardian-praeventio

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/565212386989/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-guardian-deploy@praeventio-541ad.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${SHA} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${SHA}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          region: ${{ env.REGION }}
          flags: >-
            --port=3000
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            KMS_ADAPTER=cloud-kms
            KMS_KEY_RESOURCE_NAME=${{ secrets.KMS_KEY_RESOURCE_NAME }}
            APP_BASE_URL=https://guardian-praeventio-565212386989.us-central1.run.app
            APP_URL=https://guardian-praeventio-565212386989.us-central1.run.app
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            SESSION_SECRET=SESSION_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            IOT_WEBHOOK_SECRET=IOT_WEBHOOK_SECRET:latest
            VITE_GOOGLE_MAPS_API_KEY=VITE_GOOGLE_MAPS_API_KEY:latest
            VITE_OPENWEATHER_API_KEY=VITE_OPENWEATHER_API_KEY:latest

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

      - name: Post-deploy smoke tests
        env:
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "::error::Deploy step did not surface a URL"
            exit 1
          fi
          echo "Smoke-testing $URL"
          # 1) Public health endpoint must return 200
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -w "health: %{http_code}\n" \
            "$URL/api/health"
          # 2) Root (SPA index.html) must return 200 — unauthenticated, served
          # by express.static in server.ts before any auth middleware.
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -w "root: %{http_code}\n" \
            "$URL/"
