name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
  # Operator-initiated deploy of main HEAD, independent of the CI gate. Useful
  # when CI was cancelled by the flaky open-handle hang (deploy then never fires)
  # or to re-trigger after a transient infra failure during build/push.
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: praeventio-541ad
  # H16: alineado con cloudbuild.yaml (data residency Chile, Ley 19.628)
  REGION: southamerica-west1
  SERVICE: guardian-praeventio
  # H17: misma image path que cloudbuild (api repo + southamerica-west1)
  IMAGE: southamerica-west1-docker.pkg.dev/praeventio-541ad/praeventio/api

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    # Run on a successful CI workflow_run OR a manual dispatch of main HEAD.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run → the SHA CI validated; workflow_dispatch → main HEAD.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/565212386989/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-guardian-deploy@praeventio-541ad.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker southamerica-west1-docker.pkg.dev --quiet

      # The push target (southamerica-west1-docker.pkg.dev/.../praeventio/api)
      # requires the `praeventio` Docker repository to exist in Artifact
      # Registry. cloudbuild.yaml declares it (_REPO: "praeventio") but never
      # created it, so the very first GitHub-Actions deploy failed with
      # `name unknown: Repository "praeventio" not found`. Create it idempotently
      # so the deploy is self-provisioning (data residency Chile: same region as
      # the image path + Cloud Run service, Ley 19.628).
      - name: Ensure Artifact Registry repository exists
        run: |
          set -euo pipefail
          if ! gcloud artifacts repositories describe praeventio \
              --location=southamerica-west1 \
              --project="${{ env.PROJECT_ID }}" >/dev/null 2>&1; then
            echo "Creating Artifact Registry repo 'praeventio' in southamerica-west1..."
            gcloud artifacts repositories create praeventio \
              --repository-format=docker \
              --location=southamerica-west1 \
              --project="${{ env.PROJECT_ID }}" \
              --description="Praeventio Guard API container images"
          else
            echo "Artifact Registry repo 'praeventio' already exists."
          fi

      - name: Build and push Docker image
        env:
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          # H17: usar Dockerfile.api (runtime moderno) en vez del legado Dockerfile (monolito API+frontend)
          docker build \
            -f Dockerfile.api \
            -t ${{ env.IMAGE }}:${SHA} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${SHA}
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${SHA}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha || github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --port=3000
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            KMS_ADAPTER=cloud-kms
            APP_BASE_URL=https://app.praeventio.net
            APP_URL=https://app.praeventio.net
            DWG_CONVERTER_URL=${{ secrets.DWG_CONVERTER_URL }}
          # §2.28 (2026-05-21) — PHOTOGRAMMETRY_WORKER_URL + MODAL_*_URL
          # removidas. Server-side photogrammetry (COLMAP / Modal serverless GPU)
          # DESCARTADA por directiva usuario: digital twin + maqueta 3D deben
          # procesarse ON-DEVICE para reducir costos. Si en el futuro un cliente
          # B2D enterprise opt-in con budget propio requiere server-side, las
          # vars se reintroducen como add-on, NUNCA core.
          # NOTE: URLs (DWG_CONVERTER_URL) are passed via env_vars from GitHub
          # Actions secrets — they are not secrets in the cryptographic sense
          # (just URLs), so we keep them out of Secret Manager to reduce the
          # rotation surface. Bearer tokens paired with each URL DO live in
          # Secret Manager (see below).
          # KMS KEK resource name moved here from env_vars: the GitHub Actions
          # secret `KMS_KEY_RESOURCE_NAME` was empty, so the container booted with
          # an empty value and exited 1 — "[boot] FATAL: Production with cloud-kms
          # requires KMS_KEY_RESOURCE_NAME to point at the key encryption key". The
          # real value (projects/.../cryptoKeys/oauth-tokens-kek) lives in Secret
          # Manager, so mount it from there (a real entry below, NOT a comment).
          secrets: |
            KMS_KEY_RESOURCE_NAME=KMS_KEY_RESOURCE_NAME:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            SESSION_SECRET=SESSION_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            IOT_WEBHOOK_SECRET=IOT_WEBHOOK_SECRET:latest
            VITE_GOOGLE_MAPS_API_KEY=VITE_GOOGLE_MAPS_API_KEY:latest
            VITE_OPENWEATHER_API_KEY=VITE_OPENWEATHER_API_KEY:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            VITE_FIREBASE_VAPID_KEY=VITE_FIREBASE_VAPID_KEY:latest
            WEBPAY_COMMERCE_CODE=WEBPAY_COMMERCE_CODE:latest
            WEBPAY_API_KEY=WEBPAY_API_KEY:latest
            MP_IPN_SECRET=MP_IPN_SECRET:latest
            GOOGLE_PLAY_PACKAGE_NAME=GOOGLE_PLAY_PACKAGE_NAME:latest
            GOOGLE_PLAY_SERVICE_ACCOUNT_JSON=GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:latest
            GOOGLE_PLAY_RTDN_TOPIC=GOOGLE_PLAY_RTDN_TOPIC:latest
            SENTRY_DSN=SENTRY_DSN:latest
            VITE_SENTRY_DSN=VITE_SENTRY_DSN:latest
            KHIPU_RECEIVER_ID=KHIPU_RECEIVER_ID:latest
            KHIPU_SECRET=KHIPU_SECRET:latest
            DWG_CONVERTER_TOKEN=DWG_CONVERTER_TOKEN:latest

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

      - name: Post-deploy smoke tests
        env:
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "::error::Deploy step did not surface a URL"
            exit 1
          fi
          echo "Smoke-testing $URL"
          # 1) Public health endpoint must return 200
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -w "health: %{http_code}\n" \
            "$URL/api/health"
          # 2) Root (SPA index.html) must return 200 — unauthenticated, served
          # by express.static in server.ts before any auth middleware.
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -w "root: %{http_code}\n" \
            "$URL/"

      # Sprint 25 Bucket TT — Cloud Scheduler auto-setup.
      # Idempotente: si ya existe el job, lo update; si no, lo create.
      # Esto cierra el ciclo "tiene la lógica" → "ejecuta automáticamente"
      # sin requerir que el operador ejecute gcloud manualmente cada deploy.
      - name: Setup Cloud Scheduler — daily climate risk scan
        env:
          URL: ${{ steps.deploy.outputs.url }}
          PROJECT_ID: ${{ env.PROJECT_ID }}
        run: |
          set -euo pipefail

          JOB_NAME="climate-daily-scan"
          # 05:00 Santiago = 08:00 UTC (durante CLT) / 09:00 UTC (durante CLST DST)
          # Cloud Scheduler resuelve el TZ automáticamente con --time-zone.
          SCHEDULE="0 5 * * *"
          TZ="America/Santiago"
          TARGET_URL="${URL}/api/admin/jobs/climate-scan"
          SCHEDULER_LOCATION="us-central1"

          # Service account dedicada para el scheduler (debe existir
          # con role run.invoker sobre el Cloud Run service).
          # Si no existe la SA, se crea idempotente abajo.
          SCHEDULER_SA="climate-scan-sa@${PROJECT_ID}.iam.gserviceaccount.com"

          # Habilitar APIs necesarias (idempotente).
          gcloud services enable cloudscheduler.googleapis.com \
            --project="$PROJECT_ID" --quiet || true

          # Crear SA si no existe (idempotente).
          if ! gcloud iam service-accounts describe "$SCHEDULER_SA" \
              --project="$PROJECT_ID" >/dev/null 2>&1; then
            echo "Creating service account climate-scan-sa..."
            gcloud iam service-accounts create climate-scan-sa \
              --display-name="Climate Scan Cloud Scheduler" \
              --project="$PROJECT_ID"
          fi

          # Grant run.invoker role a la SA sobre el Cloud Run service
          # (idempotente — gcloud no falla si el binding ya existe).
          gcloud run services add-iam-policy-binding "${{ env.SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="$PROJECT_ID" \
            --member="serviceAccount:${SCHEDULER_SA}" \
            --role="roles/run.invoker" \
            --quiet || true

          # Crear o update el scheduler job.
          if gcloud scheduler jobs describe "$JOB_NAME" \
              --location="$SCHEDULER_LOCATION" \
              --project="$PROJECT_ID" >/dev/null 2>&1; then
            echo "Updating existing scheduler job $JOB_NAME..."
            gcloud scheduler jobs update http "$JOB_NAME" \
              --location="$SCHEDULER_LOCATION" \
              --project="$PROJECT_ID" \
              --schedule="$SCHEDULE" \
              --time-zone="$TZ" \
              --uri="$TARGET_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SCHEDULER_SA" \
              --oidc-token-audience="$URL" \
              --quiet
          else
            echo "Creating scheduler job $JOB_NAME..."
            gcloud scheduler jobs create http "$JOB_NAME" \
              --location="$SCHEDULER_LOCATION" \
              --project="$PROJECT_ID" \
              --schedule="$SCHEDULE" \
              --time-zone="$TZ" \
              --uri="$TARGET_URL" \
              --http-method=POST \
              --oidc-service-account-email="$SCHEDULER_SA" \
              --oidc-token-audience="$URL" \
              --description="Daily climate risk scan — Sprint 25 Bucket TT. Reads active outdoor projects, fetches Open-Meteo 3-day forecast per project geo, generates Zettelkasten risk nodes via buildClimateRiskNodes (climateRiskCoupling.ts), persists with idempotent SHA-256 keys, and multicasts FCM to designated supervisors. See docs/runbooks/CLIMATE_SCAN_RUNBOOK.md."
          fi

          echo "✓ Cloud Scheduler setup complete: $JOB_NAME runs daily at 05:00 ${TZ} → POST $TARGET_URL"

      # Cloud Scheduler — backup + maintenance jobs (firestore-backup,
      # check-overdue-maintenance, weekly-digest, replicate-critical).
      # Idempotente per-job.
      - name: Setup Cloud Scheduler — maintenance jobs
        env:
          URL: ${{ steps.deploy.outputs.url }}
          PROJECT_ID: ${{ env.PROJECT_ID }}
        run: |
          set -euo pipefail

          SCHEDULER_SA="climate-scan-sa@${PROJECT_ID}.iam.gserviceaccount.com"
          SCHEDULER_LOCATION="us-central1"

          ensure_job() {
            local name="$1"
            local schedule="$2"
            local path="$3"
            local description="$4"

            if gcloud scheduler jobs describe "$name" \
                --location="$SCHEDULER_LOCATION" \
                --project="$PROJECT_ID" >/dev/null 2>&1; then
              gcloud scheduler jobs update http "$name" \
                --location="$SCHEDULER_LOCATION" \
                --project="$PROJECT_ID" \
                --schedule="$schedule" \
                --time-zone="America/Santiago" \
                --uri="${URL}${path}" \
                --http-method=POST \
                --oidc-service-account-email="$SCHEDULER_SA" \
                --oidc-token-audience="$URL" \
                --quiet
              echo "✓ Updated $name"
            else
              gcloud scheduler jobs create http "$name" \
                --location="$SCHEDULER_LOCATION" \
                --project="$PROJECT_ID" \
                --schedule="$schedule" \
                --time-zone="America/Santiago" \
                --uri="${URL}${path}" \
                --http-method=POST \
                --oidc-service-account-email="$SCHEDULER_SA" \
                --oidc-token-audience="$URL" \
                --description="$description" \
                --quiet
              echo "✓ Created $name"
            fi
          }

          # Sprint 22 Bucket K — overdue maintenance check (every hour)
          ensure_job "maintenance-check-overdue" \
            "0 * * * *" \
            "/api/maintenance/check-overdue" \
            "Hourly overdue maintenance scan (Sprint 22 K). Moves PlacedObjects installed→maintenance_due."

          # Sprint 22 Bucket W — critical replicate audit_logs + invoices (hourly)
          ensure_job "replicate-critical" \
            "30 * * * *" \
            "/api/admin/replicate-critical" \
            "Hourly write-through replication audit_logs + invoices to GCS (Sprint 22 W)."

          # Sprint 22 Bucket Y — weekly digest (Mondays 09:00 Santiago)
          ensure_job "weekly-digest" \
            "0 9 * * 1" \
            "/api/admin/jobs/weekly-digest" \
            "Weekly safety digest emailed to supervisors (Sprint 22 Y)."

          echo "✓ Maintenance scheduler jobs setup complete"
