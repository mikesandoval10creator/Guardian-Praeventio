name: Smoke Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress smoke runs when a new commit is pushed to the same PR.
concurrency:
  group: smoke-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run smoke
      - if: failure()
        run: echo "Smoke tests failed - DO NOT MERGE without investigation"
