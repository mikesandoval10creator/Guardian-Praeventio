<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- DNS Prefetch & Preconnect for Firebase and Google APIs -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <!-- Preconnect + preload critical fonts (Inter shell weights 400/700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" media="print" onload="this.media='all'" />

    <title>Praeventio Guard</title>

  </head>
  <body>
    <div id="root"></div>
    <!-- Sprint 20 13th wave Bucket C — `nonce="__CSP_NONCE__"` placeholder is
         swapped for a per-request base64 nonce by the Express middleware
         (`res.locals.cspNonce`). Vite REPLACES this script tag during the
         build (rewriting `/src/main.tsx` to `/assets/index-XXX.js`), which
         strips arbitrary attributes — the `cspNoncePlaceholder` plugin in
         `vite.config.ts` re-stamps the placeholder onto the emitted script
         so production HTML still gets the nonce. Dev mode serves this file
         unchanged; the literal placeholder is harmless because the entry
         tag is satisfied by `'self'` in script-src. -->
    <script type="module" src="/src/main.tsx" nonce="__CSP_NONCE__"></script>
  </body>
</html>
