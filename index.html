<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- SEO: canonical + hreflang alternates for active launch locales -->
    <link rel="canonical" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="es-CL" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="es-MX" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="es-PE" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="es-AR" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="pt-BR" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="en" href="https://app.praeventio.app/" />
    <link rel="alternate" hreflang="x-default" href="https://app.praeventio.app/" />

    <!-- DNS Prefetch & Preconnect for Firebase and Google APIs -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <!-- Preconnect + preload critical fonts (Inter shell weights 400/700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    <!-- Load the font stylesheet directly. The previous async pattern
         (media="print" onload="this.media='all'") relied on an INLINE event
         handler, which our strict CSP (script-src nonce + strict-dynamic, no
         'unsafe-inline') BLOCKS — so onload never fired, the media stayed
         "print", and Inter never applied on screen (confirmed in the deployed
         app's console). The matching `preload` above already warms it, so a
         direct stylesheet load is not render-blocking in practice. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />

    <title>Praeventio Guard</title>

  </head>
  <body>
    <div id="root"></div>
    <!-- Sprint 20 13th wave Bucket C — `nonce="__CSP_NONCE__"` placeholder is
         swapped for a per-request base64 nonce by the Express middleware
         (`res.locals.cspNonce`). Vite REPLACES this script tag during the
         build (rewriting `/src/main.tsx` to `/assets/index-XXX.js`), which
         strips arbitrary attributes — the `cspNoncePlaceholder` plugin in
         `vite.config.ts` re-stamps the placeholder onto the emitted script
         so production HTML still gets the nonce. Dev mode serves this file
         unchanged; the literal placeholder is harmless because the entry
         tag is satisfied by `'self'` in script-src. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
