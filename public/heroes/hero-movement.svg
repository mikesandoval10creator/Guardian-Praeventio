<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3a1a"/>
      <stop offset="100%" stop-color="#1a2610"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <!-- walking person -->
  <g transform="translate(300,200)" fill="none" stroke="#4db6ac" stroke-width="3" opacity="0.35">
    <circle cx="0" cy="-70" r="18"/>
    <line x1="0" y1="-52" x2="0" y2="10"/>
    <line x1="0" y1="-30" x2="-35" y2="5"/>
    <line x1="0" y1="-30" x2="30" y2="-10"/>
    <line x1="0" y1="10" x2="-25" y2="55"/>
    <line x1="0" y1="10" x2="30" y2="50"/>
    <!-- motion lines -->
    <line x1="-80" y1="-20" x2="-50" y2="-20" opacity="0.5"/>
    <line x1="-80" y1="5" x2="-55" y2="5" opacity="0.3"/>
  </g>
</svg>
