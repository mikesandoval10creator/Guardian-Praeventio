#   --public-access-prevention
#
# # Lifecycle (save as lifecycle.json, then apply)
# gcloud storage buckets update gs://praeventio-backups --lifecycle-file=lifecycle.json
#
# # Service account
# gcloud iam service-accounts create firestore-backup \
#   --project=praeventio-prod \
#   --display-name="Firestore nightly backup"
#
# # IAM bindings
# gcloud projects add-iam-policy-binding praeventio-prod \
#   --member=serviceAccount:firestore-backup@praeventio-prod.iam.gserviceaccount.com \
#   --role=roles/datastore.importExportAdmin
#
# gcloud projects add-iam-policy-binding praeventio-prod \
