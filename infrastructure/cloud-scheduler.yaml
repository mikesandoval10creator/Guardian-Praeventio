#   --time-zone="Etc/UTC" \
#   --uri="https://run.googleapis.com/v2/projects/praeventio-prod/locations/southamerica-west1/jobs/firestore-nightly-backup:run" \
#   --http-method=POST \
#   --oauth-service-account-email=firestore-backup@praeventio-prod.iam.gserviceaccount.com
